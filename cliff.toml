[changelog]
header = "# Changelog\n\n"
body = """{% if version %}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/mateo-m/kotoba/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat\\(release\\):", group = "Release" },
  { message = "^feat", group = "Features" },
  { message = "^fix\\(release\\):", group = "Release" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^ui|^style", group = "UI" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI" },
  { message = "^test", group = "Tests" },
  { message = "^chore", group = "Chores" },
  { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
