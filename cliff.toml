[changelog]
header = "# Changelog\n\n"
body = """{% if version %}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/mateo-m/kotoba/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
# Library-scoped releases: runtime (kotoba/), catalog CLI (tools/, bin/kotoba).
# Docs, CI, release metadata, and repo-only tooling are excluded.
include_paths = [
  "kotoba/**",
  "tools/catalog_tools.rb",
  "tools/rgss_rxdata_stubs.rb",
  "tools/validators/**",
  "bin/kotoba",
]
exclude_paths = [
  "kotoba/VERSION",
  "tools/integration_release.rb",
  "tools/local_fixture_config.rb",
]
commit_parsers = [
  { message = "^docs", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^fix\\(docs\\)", skip = true },
  { message = "^feat\\(docs\\)", skip = true },
  { message = "(?i)^chore.*docs", skip = true },
  { message = "^feat\\(release\\):", group = "Release" },
  { message = "^feat", group = "Features" },
  { message = "^fix\\(release\\):", group = "Release" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^ui|^style", group = "UI" },
  { message = "^chore", group = "Chores" },
  { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
