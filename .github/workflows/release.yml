name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild release assets for (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: |
          docker build --platform linux/amd64 \
            --build-arg RUBY_MAJOR=1.8 \
            --build-arg RUBY_VERSION=1.8.7-p374 \
            -t ruby-legacy:1.8.7-p374 \
            -f docker/ruby-legacy/Dockerfile .
      - run: bun run lint
      - run: sudo apt-get update && sudo apt-get install -y zip
      - run: |
          mkdir -p dist
          ruby bin/build-integration-zips dist
      - name: Install git-cliff
        run: |
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v2.9.1/git-cliff-2.9.1-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/git-cliff-*/git-cliff /usr/local/bin/git-cliff
      - name: Generate release notes
        run: |
          chmod +x scripts/release-notes.sh
          scripts/release-notes.sh "${{ inputs.tag }}" > release-notes.md
          cat release-notes.md
      - name: Upload release assets
        run: |
          gh release upload "${{ inputs.tag }}" dist/*.zip --clobber
          gh release edit "${{ inputs.tag }}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
