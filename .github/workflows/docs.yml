name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "docs-versions/**"
      - "kotoba/VERSION"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/configure-pages@v4
      - run: bun install
      - run: bun run docs:build:site
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/
          VITEPRESS_REPOSITORY_NAME: ${{ github.event.repository.name }}
          VITEPRESS_GITHUB_REPO: ${{ github.repository }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
