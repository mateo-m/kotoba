name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "versioned_docs/**"
      - "versioned_sidebars/**"
      - "versions.json"
      - "docusaurus.config.ts"
      - "sidebars.ts"
      - "docs-site-config.ts"
      - "src/**"
      - "static/**"
      - "kotoba/VERSION"
      - "package.json"
      - "bun.lock"
      - "bin/check-docs-site"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run docs:build
        env:
          DOCUSAURUS_BASE: /${{ github.event.repository.name }}/
          DOCUSAURUS_REPOSITORY_NAME: ${{ github.event.repository.name }}
          DOCUSAURUS_GITHUB_REPO: ${{ github.repository }}
      - run: bin/check-docs-site build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build
          force_orphan: true
