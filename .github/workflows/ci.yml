name: CI

on:
  pull_request:
    paths:
      - "kotoba/**"
      - "tools/**"
      - "test/**"
      - "bin/**"
      - "schemas/**"
      - "docker/**"
      - "docs/**"
      - "Rakefile"
      - "package.json"
      - "bun.lock"
      - "lefthook.yml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "kotoba/**"
      - "tools/**"
      - "test/**"
      - "bin/**"
      - "schemas/**"
      - "docker/**"
      - "docs/**"
      - "Rakefile"
      - "package.json"
      - "bun.lock"
      - "lefthook.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'kotoba/**'
              - 'tools/**'
              - 'test/**'
              - 'bin/**'
              - 'schemas/**'
              - 'docker/**'
              - 'Rakefile'
              - 'package.json'
              - 'bun.lock'
              - 'lefthook.yml'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'versioned_docs/**'
              - 'versioned_sidebars/**'
              - 'versions.json'
              - 'docusaurus.config.ts'
              - 'sidebars.ts'
              - 'docs-site-config.ts'
              - 'src/**'
              - 'static/**'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: |
          docker build --platform linux/amd64 \
            --build-arg RUBY_MAJOR=1.8 \
            --build-arg RUBY_VERSION=1.8.7-p374 \
            -t ruby-legacy:1.8.7-p374 \
            -f docker/ruby-legacy/Dockerfile .
      - run: bun run lint

  docs:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run docs:build
        env:
          DOCUSAURUS_BASE: /${{ github.event.repository.name }}/
          DOCUSAURUS_REPOSITORY_NAME: ${{ github.event.repository.name }}
          DOCUSAURUS_GITHUB_REPO: ${{ github.repository }}
